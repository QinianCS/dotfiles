# Kenkyo keyd configuration
#
# This file defines the Kenkyo layout, which features:
# - Home row modifiers (Home Row Mods) with advanced timing to prevent misfires.
# - 'Extend' layer for navigation and media controls.
# - 'Fumbol' layer for numbers, function keys, and symbols.
# - Chords for common keys like Escape, Backspace, Tab, and Enter.

[ids]

# Match all keyboard devices by default
*

[main]
capslock = overloadi(backspace, timeout(overloadt2(meta, backspace, 200), 500, backspace), 125)


q = q
w = w
e = f
r = p
t = b
y = j
u = l
i = u
o = y
p = ;
a = a
s = r
d = s
f = t
g = g
h = k
j = n
k = e
l = i
; = o
z = x
x = c
c = d
v = v
b = z
n = m
m = h
a+s+d+f = toggle(qwerty)

# n+e+i = toggle(qwerty)
j+k+l+' = toggle(qwerty)


# Home Row Modifiers
# The following complex mapping is used for home row mods:
# a = overloadi(a, timeout(overloadt2(meta, a, 200), 500, a), 125)
# 
# 1. `overloadi(key, ..., 125)`: If typed fast (within 125ms of another key), 
#    immediately emit 'key'. This prevents mods from triggering during normal typing.
# 2. `timeout(..., 500, key)`: If held for more than 500ms without other keys, 
#    it defaults to repeating the 'key' (auto-repeat).
# 3. `overloadt2(mod, key, 200)`: If held for 200ms or used with another key (tap), 
#    it acts as 'mod'. Otherwise, it emits 'key' on tap. This ensures the modifier 
#    triggers only if another key is pressed while it is held.


a = overloadi(a, timeout(overloadt2(meta, a, 200), 500, a), 125)
s = overloadi(r, timeout(overloadt2(alt, r, 200), 500, r), 125)
d = overloadi(s, timeout(overloadt2(shift, s, 200), 500, s), 125)
f = overloadi(t, timeout(overloadt2(control, t, 200), 500, t), 125)
j = overloadi(n, timeout(overloadt2(control, n, 200), 500, n), 125)
k = overloadi(e, timeout(overloadt2(shift, e, 200), 500, e), 125)
l = overloadi(i, timeout(overloadt2(alt, i, 200), 500, i), 125)
semicolon = overloadi(o, timeout(overloadt2(meta, o, 200), 500, o), 125)

# Bottom Row Modifiers
# z = overloadi(x, timeout(overloadt2(control, x, 200), 500, x), 125)
# x = overloadi(c, timeout(overloadt2(altgr, c, 200), 500, c), 125)
# v = overloadi(v, timeout(overloadt2(fumbol, v, 200), 500, v), 125)
b = overloadi(z, timeout(overloadt2(altgr, z, 200), 500, z), 125)
m = overloadi(h, timeout(overloadt2(fumbol, h, 200), 500, h), 125)
dot = overloadi(dot, timeout(overloadt2(altgr, dot, 200), 500, dot), 125)
slash = overloadi(slash, timeout(overloadt2(control, slash, 200), 500, slash), 125)

# Space is overloaded to the 'extend' layer
# space = overloadi(space, timeout(overloadt2(extend, space, 200), 500, space), 200)
space = overloadt(extend, space,200) 

# Chords (Simultaneous key presses)
# w+e = esc
# i+o = backspace
# x+c = tab
# comma+dot = enter

[qwerty]
a+s+d+f = toggle(qwerty)
j+k+l+' = toggle(qwerty)
q = q
w = w
e = e
r = r
t = t
y = y
u = u
i = i
o = o
p = p
a = a
s = s
d = d
f = f
g = g
h = h
j = j
k = k
l = l
; = ;
z = z
x = x
c = c
v = v
b = b
n = n
m = m
[extend]
q = escape
capslock = layer(meta)

# Navigation and Editing
e = swap(shift)
r = swap(fumbol)
y = pageup
u = home
i = up
o = end
p = insert

# Layer Modifiers
a = layer(meta)
s = layer(alt)
d = layer(shift)
f = layer(control)
g = compose

# Navigation and Media
h = pagedown
j = left
k = down
l = right
semicolon = escape
z = mute
x = volumedown
c = volumeup
v = pausecd

# Useful shortcuts
b = toggle(fumbol)
n = tab
m = backspace
comma = space
dot = delete
slash = enter

[fumbol]

# Function Keys
q = f1
w = f2
e = f3
r = f4
t = f5
y = f6
u = f7
i = f8
o = f9
p = f10
b = f11
n = f12

# Numbers with Home Row Mods
a = overloadi(1, timeout(overloadt2(meta, 1, 200), 500, 1), 125)
s = overloadi(2, timeout(overloadt2(alt, 2, 200), 500, 2), 125)
d = overloadi(3, timeout(overloadt2(shift, 3, 200), 500, 3), 125)
f = overloadi(4, timeout(overloadt2(control, 4, 200), 500, 4), 125)
g = 5
h = 6
j = overloadi(7, timeout(overloadt2(control, 7, 200), 500, 7), 125)
k = overloadi(8, timeout(overloadt2(shift, 8, 200), 500, 8), 125)
l = overloadi(9, timeout(overloadt2(alt, 9, 200), 500, 9), 125)
semicolon = overloadi(0, timeout(overloadt2(meta, 0, 200), 500, 0), 125)

# Symbols and Punctuations
z = overloadi(102nd, timeout(overloadt2(control, 102nd, 200), 500, 102nd), 125)
x = overloadi(grave, timeout(overloadt2(altgr, grave, 200), 500, grave), 125)
c = minus
v = equal
m = apostrophe
comma = leftbrace
dot = overloadi(rightbrace, timeout(overloadt2(altgr, rightbrace, 200), 500, rightbrace), 125)
slash = overloadi(backslash, timeout(overloadt2(control, backslash, 200), 500, backslash), 125)

# Fumbol Chords
w+e = esc
i+o = backspace
s+d = kpminus
d+f = kpplus
s+f = kpequal
j+k = kpslash
k+l = kpasterisk
j+l = dot
x+c = tab
comma+dot = enter
